version: '3.8'

services:
  # ==================== DATABASES ====================
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: jobportal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== BACKEND SERVICES ====================
  springboot-service:
    build:
      context: ./springboot-service
      dockerfile: Dockerfile
    container_name: jobportal-springboot
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SPRING_BOOT_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jobportal-network
    restart: on-failure

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: jobportal-gateway
    environment:
      SPRINGBOOT_URL: http://springboot-service:8080
      GATEWAY_PORT: 8000
    ports:
      - "${GATEWAY_PORT}:8000"
    depends_on:
      - springboot-service
    networks:
      - jobportal-network
    restart: on-failure

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobportal-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - jobportal-network

volumes:
  postgres_data:


networks:
  jobportal-network:
    driver: bridge
